name: Mirror Nexu

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  mirror-nexu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MCLAW }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Mirror nexu-io/nexu main → nexu-main
        run: |
          set -e

          git remote add nexu https://github.com/nexu-io/nexu.git 2>/dev/null || true
          echo "拉取 nexu 仓库..."
          git fetch nexu main --depth=1

          if git show-ref --verify --quiet refs/remotes/origin/nexu-main; then
            echo "nexu-main 分支已存在，合并更新..."
            git checkout nexu-main
            git merge nexu/main --allow-unrelated-histories -m "mirror: nexu-io/nexu main → nexu-main [skip ci]"
          else
            echo "首次运行，创建 nexu-main 分支..."
            git checkout -b nexu-main nexu/main
          fi

          git push --force-with-lease origin nexu-main
          echo "镜像完成！"
