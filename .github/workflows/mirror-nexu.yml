name: Mirror Nexu

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  mirror-nexu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MCLAW }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Mirror nexu-io/nexu main → nexu-main
        run: |
          set -e

          git remote add nexu https://github.com/nexu-io/nexu.git 2>/dev/null || true
          echo "拉取 nexu 仓库..."
          git fetch nexu main

          echo "重置 nexu-main 为 nexu/main 的精确镜像..."
          git checkout -B nexu-main nexu/main

          git push origin nexu-main --force
          echo "镜像完成！"
