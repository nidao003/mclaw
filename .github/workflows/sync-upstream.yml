name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时运行一次
  workflow_dispatch:         # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node 20 警告

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MCLAW }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/ValueCell-ai/mclaw.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories
          git push --force-with-lease origin main
