<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QClaw - 应用连接</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #E11D48;
      --color-primary-container:    #FFF1F2;
      --color-on-primary:           #ffffff;
      --color-background:           #FAFAFA;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F4F4F5;
      --color-surface-container-high:     #E4E4E7;
      --color-surface-container-highest:  #D4D4D8;
      --color-on-surface:           #18181B;
      --color-on-surface-variant:   #71717A;
      --color-success:  #10B981;
      --color-error:    #EF4444;
      --color-warning:  #F59E0B;
      --color-outline:          #E4E4E7;
      --color-outline-variant:  #A1A1AA;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- macOS 窗口控件 -->
  <div class="fixed top-3 left-3 z-50 flex gap-2">
    <button class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-600"></button>
    <button class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-600"></button>
    <button class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-600"></button>
  </div>

  <!-- 侧边栏导航 -->
  <aside class="fixed left-0 top-0 h-screen w-60 bg-zinc-900 text-zinc-100 flex flex-col z-40">
    <div class="p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm">初</div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">小初</div>
        <div class="text-xs text-zinc-400 truncate">免费版</div>
      </div>
    </div>
    <div class="px-3 pb-3">
      <div class="relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
        <input type="text" placeholder="搜索" class="w-full bg-zinc-800 border-none rounded-lg pl-9 pr-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-700">
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto px-3 space-y-0.5">
      <a href="chat.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="message-square" class="w-4 h-4"></i><span>对话</span>
      </a>
      <a href="expert.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="users" class="w-4 h-4"></i><span>专家</span>
      </a>
      <a href="task.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="check-circle" class="w-4 h-4"></i><span>任务</span>
      </a>
      <a href="file.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="folder" class="w-4 h-4"></i><span>文件</span>
      </a>
      <a href="connect.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-zinc-800 text-zinc-100" aria-current="page">
        <i data-lucide="link" class="w-4 h-4"></i><span>连接</span>
      </a>
      <a href="memory.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="brain" class="w-4 h-4"></i><span>记忆</span>
      </a>
      <a href="lab.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="flask-conical" class="w-4 h-4"></i><span>Lab</span>
      </a>
    </nav>
    <div class="p-3 border-t border-zinc-700/20">
      <div class="flex items-center gap-1">
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="coins" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="smartphone" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="bell" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="settings" class="w-4 h-4"></i></button>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="ml-60 min-h-screen bg-background p-6">
    <!-- 页面标题 -->
    <div class="mb-6">
      <h1 class="text-xl font-bold text-zinc-900 mb-1">连接</h1>
      <p class="text-sm text-zinc-500">连接常用的应用，让Agent帮你跨工具自动完成任务</p>
    </div>

    <!-- 分类标签 -->
    <div class="flex items-center gap-2 mb-6 overflow-x-auto">
      <button class="px-4 py-2 rounded-full text-sm font-medium bg-zinc-100 text-zinc-900 whitespace-nowrap">全部 23</button>
      <button class="px-4 py-2 rounded-full text-sm font-medium text-zinc-500 hover:bg-zinc-50 transition-colors whitespace-nowrap">文档知识</button>
      <button class="px-4 py-2 rounded-full text-sm font-medium text-zinc-500 hover:bg-zinc-50 transition-colors whitespace-nowrap">办公协同</button>
      <button class="px-4 py-2 rounded-full text-sm font-medium text-zinc-500 hover:bg-zinc-50 transition-colors whitespace-nowrap">邮件服务</button>
      <button class="px-4 py-2 rounded-full text-sm font-medium text-zinc-500 hover:bg-zinc-50 transition-colors whitespace-nowrap">生活服务</button>
      <button class="px-4 py-2 rounded-full text-sm font-medium text-zinc-500 hover:bg-zinc-50 transition-colors whitespace-nowrap">网盘存储</button>
    </div>

    <!-- 应用卡片列表 -->
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-blue-500 flex items-center justify-center text-white text-xl font-bold">T</div>
        <div class="flex-1">
          <div class="text-base font-semibold text-zinc-900 mb-1">腾讯文档</div>
          <div class="text-xs text-zinc-500">在线文档、表格、演示文稿协作</div>
        </div>
        <button class="px-4 py-2 rounded-lg bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-colors">连接</button>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-400 to-orange-400 flex items-center justify-center text-white text-xl font-bold">W</div>
        <div class="flex-1">
          <div class="text-base font-semibold text-zinc-900 mb-1">金山文档</div>
          <div class="text-xs text-zinc-500">WPS在线文档协作平台</div>
        </div>
        <button class="px-4 py-2 rounded-lg bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-colors">连接</button>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-red-500 flex items-center justify-center text-white text-xl font-bold">B</div>
        <div class="flex-1">
          <div class="text-base font-semibold text-zinc-900 mb-1">百度网盘</div>
          <div class="text-xs text-zinc-500">云存储、文件同步与分享</div>
        </div>
        <button class="px-4 py-2 rounded-lg bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-colors">连接</button>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-green-500 flex items-center justify-center text-white text-xl font-bold">N</div>
        <div class="flex-1">
          <div class="text-base font-semibold text-zinc-900 mb-1">Notion</div>
          <div class="text-xs text-zinc-500">知识库、笔记、项目管理</div>
        </div>
        <button class="px-4 py-2 rounded-lg bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-colors">连接</button>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-violet-500 flex items-center justify-center text-white text-xl font-bold">F</div>
        <div class="flex-1">
          <div class="text-base font-semibold text-zinc-900 mb-1">飞书</div>
          <div class="text-xs text-zinc-500">企业协作、即时通讯、日历</div>
        </div>
        <button class="px-4 py-2 rounded-lg bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-colors">连接</button>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-white text-xl font-bold">D</div>
        <div class="flex-1">
          <div class="text-base font-semibold text-zinc-900 mb-1">DingTalk</div>
          <div class="text-xs text-zinc-500">企业通讯、考勤、审批</div>
        </div>
        <button class="px-4 py-2 rounded-lg bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-colors">连接</button>
      </div>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
