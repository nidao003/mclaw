<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QClaw - 文件空间</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #E11D48;
      --color-primary-container:    #FFF1F2;
      --color-on-primary:           #ffffff;
      --color-background:           #FAFAFA;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F4F4F5;
      --color-surface-container-high:     #E4E4E7;
      --color-surface-container-highest:  #D4D4D8;
      --color-on-surface:           #18181B;
      --color-on-surface-variant:   #71717A;
      --color-success:  #10B981;
      --color-error:    #EF4444;
      --color-warning:  #F59E0B;
      --color-outline:          #E4E4E7;
      --color-outline-variant:  #A1A1AA;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- macOS 窗口控件 -->
  <div class="fixed top-3 left-3 z-50 flex gap-2">
    <button class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-600"></button>
    <button class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-600"></button>
    <button class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-600"></button>
  </div>

  <!-- 侧边栏导航 -->
  <aside class="fixed left-0 top-0 h-screen w-60 bg-zinc-900 text-zinc-100 flex flex-col z-40">
    <div class="p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm">初</div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">小初</div>
        <div class="text-xs text-zinc-400 truncate">免费版</div>
      </div>
    </div>
    <div class="px-3 pb-3">
      <div class="relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
        <input type="text" placeholder="搜索" class="w-full bg-zinc-800 border-none rounded-lg pl-9 pr-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-700">
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto px-3 space-y-0.5">
      <a href="chat.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="message-square" class="w-4 h-4"></i><span>对话</span>
      </a>
      <a href="expert.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="users" class="w-4 h-4"></i><span>专家</span>
      </a>
      <a href="task.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="check-circle" class="w-4 h-4"></i><span>任务</span>
      </a>
      <a href="file.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-zinc-800 text-zinc-100" aria-current="page">
        <i data-lucide="folder" class="w-4 h-4"></i><span>文件</span>
      </a>
      <a href="connect.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="link" class="w-4 h-4"></i><span>连接</span>
      </a>
      <a href="memory.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="brain" class="w-4 h-4"></i><span>记忆</span>
      </a>
      <a href="lab.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="flask-conical" class="w-4 h-4"></i><span>Lab</span>
      </a>
    </nav>
    <div class="p-3 border-t border-zinc-700/20">
      <div class="flex items-center gap-1">
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="coins" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="smartphone" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="bell" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="settings" class="w-4 h-4"></i></button>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="ml-60 min-h-screen flex">
    <!-- 左侧分类栏 -->
    <div class="w-56 bg-white border-r border-zinc-200/50 p-4">
      <div class="mb-4">
        <div class="text-xs text-zinc-500 mb-1">QClaw 文件</div>
        <div class="text-sm font-medium text-zinc-900">8KB / 10G</div>
      </div>
      <div class="space-y-1">
        <a href="#" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-zinc-100 text-zinc-900 text-sm font-medium">
          <i data-lucide="layers" class="w-4 h-4"></i>
          <span class="flex-1">全部类型</span>
          <span class="text-xs text-zinc-400">12</span>
        </a>
        <a href="#" class="flex items-center gap-2 px-3 py-2 rounded-lg text-zinc-600 hover:bg-zinc-50 text-sm font-medium transition-colors">
          <i data-lucide="file-text" class="w-4 h-4"></i>
          <span class="flex-1">文档</span>
          <span class="text-xs text-zinc-400">5</span>
        </a>
        <a href="#" class="flex items-center gap-2 px-3 py-2 rounded-lg text-zinc-600 hover:bg-zinc-50 text-sm font-medium transition-colors">
          <i data-lucide="table" class="w-4 h-4"></i>
          <span class="flex-1">表格</span>
          <span class="text-xs text-zinc-400">3</span>
        </a>
        <a href="#" class="flex items-center gap-2 px-3 py-2 rounded-lg text-zinc-600 hover:bg-zinc-50 text-sm font-medium transition-colors">
          <i data-lucide="image" class="w-4 h-4"></i>
          <span class="flex-1">图片</span>
          <span class="text-xs text-zinc-400">2</span>
        </a>
        <a href="#" class="flex items-center gap-2 px-3 py-2 rounded-lg text-zinc-600 hover:bg-zinc-50 text-sm font-medium transition-colors">
          <i data-lucide="code" class="w-4 h-4"></i>
          <span class="flex-1">代码</span>
          <span class="text-xs text-zinc-400">2</span>
        </a>
      </div>
      <div class="mt-6 pt-4 border-t border-zinc-200/50">
        <div class="text-xs text-zinc-500 mb-2">外部文件</div>
        <a href="#" class="flex items-center gap-2 px-3 py-2 rounded-lg text-zinc-600 hover:bg-zinc-50 text-sm font-medium transition-colors">
          <i data-lucide="file" class="w-4 h-4 text-blue-500"></i>
          <span>腾讯文档</span>
        </a>
        <a href="#" class="flex items-center gap-2 px-3 py-2 rounded-lg text-zinc-600 hover:bg-zinc-50 text-sm font-medium transition-colors">
          <i data-lucide="book-open" class="w-4 h-4 text-emerald-500"></i>
          <span>ima知识库</span>
        </a>
      </div>
    </div>

    <!-- 右侧文件列表 -->
    <div class="flex-1 p-6">
      <!-- 工具栏 -->
      <div class="flex items-center gap-3 mb-6">
        <div class="relative flex-1">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
          <input type="text" placeholder="搜索文件" class="w-full bg-white border-none rounded-lg pl-9 pr-3 py-2 text-sm text-zinc-700 placeholder:text-zinc-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20">
        </div>
        <button class="px-3 py-2 rounded-lg text-xs font-medium bg-white text-zinc-600 shadow-sm flex items-center gap-1">
          全部 Agent <i data-lucide="chevron-down" class="w-3 h-3"></i>
        </button>
        <button class="p-2 rounded-lg bg-white text-zinc-600 shadow-sm"><i data-lucide="list" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-100 transition-colors"><i data-lucide="grid-3x3" class="w-4 h-4"></i></button>
      </div>

      <!-- 文件分组 -->
      <div class="space-y-6">
        <!-- 分组1 -->
        <div>
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="message-square" class="w-4 h-4 text-zinc-400"></i>
            <span class="text-sm font-medium text-zinc-700">代码助手对话</span>
            <span class="text-xs text-zinc-400">3 个文件</span>
          </div>
          <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="divide-y divide-zinc-100">
              <div class="flex items-center gap-4 px-4 py-3 hover:bg-zinc-50 transition-colors cursor-pointer">
                <i data-lucide="file-code" class="w-5 h-5 text-violet-500"></i>
                <span class="flex-1 text-sm text-zinc-700">crawler.py</span>
                <i data-lucide="cloud" class="w-4 h-4 text-emerald-500"></i>
                <span class="text-xs text-zinc-400 w-16">2.3 KB</span>
                <span class="text-xs text-zinc-400 w-24">QClaw</span>
                <span class="text-xs text-zinc-400">2024-01-15</span>
              </div>
              <div class="flex items-center gap-4 px-4 py-3 hover:bg-zinc-50 transition-colors cursor-pointer">
                <i data-lucide="file-text" class="w-5 h-5 text-blue-500"></i>
                <span class="flex-1 text-sm text-zinc-700">readme.md</span>
                <i data-lucide="cloud" class="w-4 h-4 text-emerald-500"></i>
                <span class="text-xs text-zinc-400 w-16">1.2 KB</span>
                <span class="text-xs text-zinc-400 w-24">QClaw</span>
                <span class="text-xs text-zinc-400">2024-01-14</span>
              </div>
              <div class="flex items-center gap-4 px-4 py-3 hover:bg-zinc-50 transition-colors cursor-pointer">
                <i data-lucide="table" class="w-5 h-5 text-emerald-500"></i>
                <span class="flex-1 text-sm text-zinc-700">data.csv</span>
                <i data-lucide="cloud" class="w-4 h-4 text-emerald-500"></i>
                <span class="text-xs text-zinc-400 w-16">5.8 KB</span>
                <span class="text-xs text-zinc-400 w-24">QClaw</span>
                <span class="text-xs text-zinc-400">2024-01-13</span>
              </div>
            </div>
          </div>
        </div>
        <!-- 分组2 -->
        <div>
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="message-square" class="w-4 h-4 text-zinc-400"></i>
            <span class="text-sm font-medium text-zinc-700">写作专家对话</span>
            <span class="text-xs text-zinc-400">2 个文件</span>
          </div>
          <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="divide-y divide-zinc-100">
              <div class="flex items-center gap-4 px-4 py-3 hover:bg-zinc-50 transition-colors cursor-pointer">
                <i data-lucide="file-text" class="w-5 h-5 text-blue-500"></i>
                <span class="flex-1 text-sm text-zinc-700">article.docx</span>
                <i data-lucide="cloud" class="w-4 h-4 text-emerald-500"></i>
                <span class="text-xs text-zinc-400 w-16">12.5 KB</span>
                <span class="text-xs text-zinc-400 w-24">写作专家</span>
                <span class="text-xs text-zinc-400">2024-01-12</span>
              </div>
              <div class="flex items-center gap-4 px-4 py-3 hover:bg-zinc-50 transition-colors cursor-pointer">
                <i data-lucide="image" class="w-5 h-5 text-amber-500"></i>
                <span class="flex-1 text-sm text-zinc-700">cover.png</span>
                <i data-lucide="cloud" class="w-4 h-4 text-emerald-500"></i>
                <span class="text-xs text-zinc-400 w-16">156 KB</span>
                <span class="text-xs text-zinc-400 w-24">写作专家</span>
                <span class="text-xs text-zinc-400">2024-01-11</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
