<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QClaw - 记忆系统</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #E11D48;
      --color-primary-container:    #FFF1F2;
      --color-on-primary:           #ffffff;
      --color-background:           #FAFAFA;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F4F4F5;
      --color-surface-container-high:     #E4E4E7;
      --color-surface-container-highest:  #D4D4D8;
      --color-on-surface:           #18181B;
      --color-on-surface-variant:   #71717A;
      --color-success:  #10B981;
      --color-error:    #EF4444;
      --color-warning:  #F59E0B;
      --color-outline:          #E4E4E7;
      --color-outline-variant:  #A1A1AA;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    }
  </style>
</head>

<body class="bg-zinc-900 text-zinc-100 font-sans">

  <!-- macOS 窗口控件 -->
  <div class="fixed top-3 left-3 z-50 flex gap-2">
    <button class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-600"></button>
    <button class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-600"></button>
    <button class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-600"></button>
  </div>

  <!-- 月亮装饰 -->
  <div class="fixed top-20 right-20 w-24 h-24 opacity-20 pointer-events-none">
    <svg viewBox="0 0 100 100" fill="currentColor" class="text-zinc-300">
      <path d="M50 5C25 5 5 25 5 50s20 45 45 45c5 0 10-1 15-2-15-8-25-23-25-41 0-18 10-33 25-41-5-1-10-2-15-2z"/>
    </svg>
  </div>

  <!-- 侧边栏导航 -->
  <aside class="fixed left-0 top-0 h-screen w-60 bg-zinc-950 text-zinc-100 flex flex-col z-40">
    <div class="p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm">初</div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">小初</div>
        <div class="text-xs text-zinc-400 truncate">免费版</div>
      </div>
    </div>
    <div class="px-3 pb-3">
      <div class="relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
        <input type="text" placeholder="搜索" class="w-full bg-zinc-800 border-none rounded-lg pl-9 pr-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-700">
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto px-3 space-y-0.5">
      <a href="chat.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="message-square" class="w-4 h-4"></i><span>对话</span>
      </a>
      <a href="expert.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="users" class="w-4 h-4"></i><span>专家</span>
      </a>
      <a href="task.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="check-circle" class="w-4 h-4"></i><span>任务</span>
      </a>
      <a href="file.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="folder" class="w-4 h-4"></i><span>文件</span>
      </a>
      <a href="connect.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="link" class="w-4 h-4"></i><span>连接</span>
      </a>
      <a href="memory.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-zinc-800 text-zinc-100" aria-current="page">
        <i data-lucide="brain" class="w-4 h-4"></i><span>记忆</span>
      </a>
      <a href="lab.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
        <i data-lucide="flask-conical" class="w-4 h-4"></i><span>Lab</span>
      </a>
    </nav>
    <div class="p-3 border-t border-zinc-800">
      <div class="flex items-center gap-1">
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="coins" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="smartphone" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="bell" class="w-4 h-4"></i></button>
        <button class="p-2 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"><i data-lucide="settings" class="w-4 h-4"></i></button>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="ml-60 min-h-screen flex">
    <!-- 左侧面板 -->
    <div class="w-72 bg-zinc-950 border-r border-zinc-800 p-4">
      <!-- 标签栏 -->
      <div class="flex items-center gap-1 mb-4">
        <button class="px-3 py-1.5 rounded-lg text-xs font-medium bg-zinc-800 text-zinc-100">日记</button>
        <button class="px-3 py-1.5 rounded-lg text-xs font-medium text-zinc-400 hover:bg-zinc-800 transition-colors">做梦</button>
        <button class="px-3 py-1.5 rounded-lg text-xs font-medium text-zinc-400 hover:bg-zinc-800 transition-colors">长期记忆</button>
      </div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-xs text-zinc-400">共 0 条日记</span>
        <label class="flex items-center gap-2 text-xs text-zinc-400">
          <input type="checkbox" class="w-3 h-3 rounded bg-zinc-800 border-zinc-700">
          增强日记
        </label>
      </div>

      <!-- 日历 -->
      <div class="bg-zinc-900 rounded-xl p-4 mb-4">
        <div class="flex items-center justify-between mb-3">
          <button class="p-1 rounded hover:bg-zinc-800 transition-colors"><i data-lucide="chevron-left" class="w-4 h-4 text-zinc-400"></i></button>
          <span class="text-sm font-medium">2026年6月</span>
          <button class="p-1 rounded hover:bg-zinc-800 transition-colors"><i data-lucide="chevron-right" class="w-4 h-4 text-zinc-400"></i></button>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center text-xs">
          <span class="text-zinc-500">日</span>
          <span class="text-zinc-500">一</span>
          <span class="text-zinc-500">二</span>
          <span class="text-zinc-500">三</span>
          <span class="text-zinc-500">四</span>
          <span class="text-zinc-500">五</span>
          <span class="text-zinc-500">六</span>
          <span class="text-zinc-600 py-1">31</span>
          <span class="text-zinc-400 py-1">1</span>
          <span class="text-zinc-400 py-1">2</span>
          <span class="text-zinc-400 py-1">3</span>
          <span class="text-zinc-400 py-1">4</span>
          <span class="text-zinc-400 py-1">5</span>
          <span class="text-zinc-400 py-1">6</span>
          <span class="text-zinc-400 py-1">7</span>
          <span class="text-zinc-400 py-1 relative">8<span class="absolute -top-0.5 -right-0.5 w-1.5 h-1.5 bg-primary rounded-full"></span></span>
          <span class="text-zinc-400 py-1">9</span>
          <span class="text-zinc-400 py-1">10</span>
          <span class="text-zinc-400 py-1">11</span>
          <span class="text-zinc-400 py-1">12</span>
          <span class="text-zinc-400 py-1">13</span>
        </div>
      </div>

      <!-- 专家分类 -->
      <div class="space-y-2">
        <div class="text-xs text-zinc-500 mb-2">专家分类</div>
        <div class="bg-zinc-900 rounded-lg p-3 flex items-center gap-2 cursor-pointer">
          <div class="w-8 h-8 rounded-full bg-zinc-700 flex items-center justify-center text-sm">全</div>
          <span class="text-sm text-zinc-300">全部专家</span>
        </div>
        <div class="bg-zinc-800 rounded-lg p-3 flex items-center gap-2 cursor-pointer">
          <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-sm">Q</div>
          <span class="text-sm text-zinc-100">QClaw</span>
        </div>
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="flex-1 p-6 flex items-center justify-center">
      <div class="text-center max-w-md">
        <div class="w-32 h-32 mx-auto mb-6 opacity-60">
          <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-400">
            <rect x="10" y="15" width="80" height="70" rx="5" />
            <line x1="25" y1="35" x2="75" y2="35" />
            <line x1="25" y1="50" x2="65" y2="50" />
            <line x1="25" y1="65" x2="55" y2="65" />
            <path d="M70 55 L80 70 L85 60 Z" fill="currentColor" />
          </svg>
        </div>
        <h2 class="text-base font-semibold text-zinc-300 mb-2">你的专家还没灵感写日记哦~</h2>
        <p class="text-sm text-zinc-500 mb-4">去聊两句，给TA点灵感吧</p>
        <button class="px-6 py-2.5 rounded-lg bg-white text-zinc-900 text-sm font-medium hover:bg-zinc-100 transition-colors">
          去聊天
        </button>
      </div>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
