appId: app.clawx.desktop
productName: mclaw
copyright: Copyright © 2026 mclaw
compression: maximum
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
      - "!icons/*.md"
      - "!icons/*.svg"
      - "!screenshot/**"
  # ⭐ QClaw 模式：运行时解包
  # mawruntime.tar.gz 包含整个 openclaw 包，首次启动时由 unpack-mclaw.cjs
  # 解包到 ~/Library/Application Support/mclaw/openclaw/，告别重打 app.asar
  - from: build/mawruntime.tar.gz
    to: mawruntime/mawruntime.tar.gz
  - from: build/mawruntime-manifest.json
    to: mawruntime/mawruntime-manifest.json
  # 解包脚本（独立 Node 跑，不依赖 Electron）
  - from: scripts/unpack-mclaw.cjs
    to: scripts/unpack-mclaw.cjs
  # 独立 Node 二进制（各平台分别打，跨平台 zip/dmg 自动选）
  - from: resources/bin/${os}-${arch}/node
    to: bin/${os}-${arch}/node
  - from: resources/bin/${os}-${arch}/node.exe
    to: bin/${os}-${arch}/node.exe
  # 反馈打包脚本（用户点"反馈问题"按钮时调用）
  - from: scripts/pack-mclaw.cjs
    to: scripts/pack-mclaw.cjs
  # Pre-bundled third-party skills (full directories, not only SKILL.md)
  - from: build/preinstalled-skills/
    to: resources/preinstalled-skills/
  # NOTE: OpenClaw plugin mirrors (dingtalk, etc.) are bundled by the
  # afterPack hook (after-pack.cjs) directly from node_modules, so they
  # don't need an extraResources entry here.

afterPack: ./scripts/after-pack.cjs

asar: true
asarUnpack:
  - "**/*.node"
  # lru-cache CJS/ESM interop: older CJS versions (v5, v6, v7) don't export
  # `LRUCache` as a named property, breaking `import { LRUCache }` in Node.js
  # 22+ (Electron 40+).  Unpacking lets afterPack patch them in place.
  - "**/node_modules/lru-cache/**"

# Disable native module rebuilding.
# The Electron renderer/main process has no native (.node) dependencies.
# All native modules (opus, sharp, koffi …) belong to openclaw, which is
# bundled separately (bundle-openclaw.mjs → extraResources) and runs in its
# own process — @electron/rebuild must NOT touch them.
npmRebuild: false

# Auto-update configuration
# Primary: Alibaba Cloud OSS (fast for Chinese users, used for auto-update)
# Fallback: GitHub Releases (backup, used when OSS is unavailable)
publish:
  - provider: generic
    url: https://oss.intelli-spectrum.com/latest
    useMultipleRangeRequest: false
  - provider: github
    owner: ValueCell-ai
    repo: mclaw

# macOS Configuration
mac:
  extraResources:
    - from: resources/bin/darwin-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true
  # 首发（0.0.1-alpha）阶段无 Apple 开发者证书，关闭 hardenedRuntime + notarize。
  # 产物为未签名包，用户首次打开需右键 → 打开（或 xattr -cr）。
  # 后续取得证书后改回 hardenedRuntime: true + notarize: true 并配 GHA secrets。
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  notarize: false
  extendInfo:
    NSMicrophoneUsageDescription: mclaw requires microphone access for voice features
    NSCameraUsageDescription: mclaw requires camera access for video features

dmg:
  # Explicit volume size prevents dmg-builder@1.2.0 auto-calculation from
  # underestimating (causes "No space left on device" for large app bundles).
  # The final .dmg is bzip2-compressed, so this only affects the temp volume.
  size: 2g
  background: resources/dmg-background.png
  icon: resources/icons/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - type: file
      x: 130
      y: 220
    - type: link
      path: /Applications
      x: 410
      y: 220

# Windows Configuration
win:
  # Skip update signature verification: we ship via OSS + GitHub without a
  # code-signing certificate, so verifying would always fail on the updater.
  verifyUpdateCodeSignature: false
  extraResources:
    - from: resources/bin/win32-${arch}
      to: bin
    - from: resources/cli/win32/
      to: cli/
  icon: resources/icons/icon.ico
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  perMachine: false
  warningsAsErrors: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  differentialPackage: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: mclaw
  uninstallDisplayName: mclaw
  license: LICENSE
  include: scripts/installer.nsh
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

# Linux Configuration
linux:
  extraResources:
    - from: resources/bin/linux-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  icon: resources/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Utility
  maintainer: mclaw Team <public@valuecell.ai>
  vendor: mclaw
  synopsis: AI Assistant powered by OpenClaw
  description: mclaw is a graphical AI assistant application that integrates with OpenClaw Gateway to provide intelligent automation and assistance across multiple messaging platforms.
  desktop:
    entry:
      Name: mclaw
      Comment: AI Assistant powered by OpenClaw
      Categories: Utility;Network;
      Keywords: ai;assistant;automation;chat;
      StartupWMClass: clawx

appImage:
  license: LICENSE

deb:
  depends:
    # Use OR syntax to support both Ubuntu 22.04 and Ubuntu 24.04 (t64 transition).
    # Ubuntu 24.04 renamed many libraries with a t64 suffix (64-bit time_t ABI transition).
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4 | libnotify4t64
    - libnss3
    - libxss1 | libxss1t64
    - libxtst6 | libxtst6t64
    - xdg-utils
    - libatspi2.0-0 | libatspi2.0-0t64
    - libuuid1
  afterInstall: scripts/linux/after-install.sh
  afterRemove: scripts/linux/after-remove.sh
